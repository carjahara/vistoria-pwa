<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Vistoria de Imóveis</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vistoria">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #2c3e50; }
iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.splash {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  z-index: 10;
  transition: opacity 0.4s ease;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash img { width: 260px; max-width: 70vw; height: auto; }
.splash .label { color: #2c3e50; font-family: -apple-system, system-ui, sans-serif; font-weight: 500; font-size: 16px; }
.splash .spinner { width: 28px; height: 28px; border: 3px solid rgba(44,62,80,0.2); border-top-color: #2c3e50; border-radius: 50%; animation: spin 0.9s linear infinite; }
.splash .hint { color: #2c3e50; font-family: -apple-system, system-ui, sans-serif; font-size: 14px; opacity: 0; transition: opacity 0.4s ease; padding: 8px 20px; border: 1px solid #2c3e50; border-radius: 20px; }
.splash .hint.show { opacity: 1; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="splash" id="splash">
  <img src="logo.png" alt="gerabytes.ai">
  <div class="label">Vistoria de Imóveis</div>
  <div class="spinner" id="splashSpinner"></div>
  <div class="hint" id="splashHint">Toque para começar</div>
</div>

<iframe id="app"
  src="https://script.google.com/macros/s/AKfycbzN2TEkf9yTEuKkbA8kBdg0ueQiJWvzMBSigeQrkjjGqaZjlI7006DdBHa7sWpKEKIFHA/exec"
  allow="camera; microphone; geolocation; clipboard-read; clipboard-write"
  allowfullscreen
></iframe>

<script>
const splash = document.getElementById('splash');
const app = document.getElementById('app');
const hint = document.getElementById('splashHint');

function esconderSplash() {
  splash.classList.add('hide');
  // Foco no iframe pra acordar o render dele (Chrome Android segura cross-origin)
  try { app.focus(); app.contentWindow && app.contentWindow.focus(); } catch (_) {}
}

// Some quando o iframe terminar de carregar
app.addEventListener('load', () => setTimeout(esconderSplash, 200));

// Toque/clique no splash dispensa imediatamente — fallback pra quando o navegador
// throttla o setTimeout em PWA mobile e segura o render do iframe cross-origin
splash.addEventListener('click', esconderSplash);
splash.addEventListener('touchstart', esconderSplash, { passive: true });

// Mostra hint "Toque para começar" depois de 3s caso ainda esteja visível
setTimeout(() => { if (!splash.classList.contains('hide')) hint.classList.add('show'); }, 3000);

// Fallback de segurança
setTimeout(esconderSplash, 8000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW falhou:', err));
  });
}
</script>

</body>
</html>
