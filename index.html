<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Vistoria de Imóveis</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vistoria">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #2c3e50; }
iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.splash {
  position: fixed;
  inset: 0;
  background: #2c3e50;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  z-index: 10;
  transition: opacity 0.4s ease;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash img { width: 96px; height: 96px; border-radius: 22px; }
.splash .label { color: white; font-family: -apple-system, system-ui, sans-serif; font-weight: 500; font-size: 16px; }
.splash .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.25); border-top-color: white; border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="splash" id="splash">
  <img src="icon-192.png" alt="Vistoria">
  <div class="label">Vistoria de Imóveis</div>
  <div class="spinner"></div>
</div>

<iframe id="app"
  src="https://script.google.com/macros/s/AKfycbzN2TEkf9yTEuKkbA8kBdg0ueQiJWvzMBSigeQrkjjGqaZjlI7006DdBHa7sWpKEKIFHA/exec"
  allow="camera; microphone; geolocation; clipboard-read; clipboard-write"
  allowfullscreen
></iframe>

<script>
// Esconde splash quando o iframe carregar
const splash = document.getElementById('splash');
const app = document.getElementById('app');
app.addEventListener('load', () => setTimeout(() => splash.classList.add('hide'), 300));
// Timeout de segurança: 8s
setTimeout(() => splash.classList.add('hide'), 8000);

// Service worker — registra pra Chrome considerar PWA instalável
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW falhou:', err));
  });
}
</script>

</body>
</html>
